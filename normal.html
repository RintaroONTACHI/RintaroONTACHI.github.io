<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rintaro ONTACHI | Academic Profile</title>
    <style>
        body { margin: 0; background-color: #0b0e14; color: #24292e; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 800px; width: 100%; padding: 20px; }
        #logged-in-view { display: none; background: white; padding: 40px; border-radius: 16px; }
        #loading-view { color: white; text-align: center; font-size: 1.2em; }
        .logout-btn { background: #d93025; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <div id="loading-view">Authenticating... Please wait.</div>

    <div id="logged-in-view" class="container">
        <button class="logout-btn" onclick="logout()">Log Out</button>
        <h1>Academic Resources</h1>
        <p><strong>Rintaro ONTACHI</strong></p>
        <hr>
        <div id="paper-content">
            <h2 id="paperTitle">Loading Paper...</h2>
            <div id="abstractText"></div>
        </div>
    </div>

    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>

    <script>
        let auth0Client = null;

        // 設定値
        const config = {
            domain: "epsilon.jp.auth0.com",
            clientId: "TQ8auFHVhAe44FtxkoOhUPyWScIOXIMI"
        };

        window.onload = async () => {
            try {
                // 1. Auth0の初期化
                auth0Client = await createAuth0Client({
                    domain: config.domain,
                    clientId: config.clientId,
                    authorizationParams: {
                        redirect_uri: window.location.origin + window.location.pathname
                    }
                });

                // 2. ログイン後の処理
                const query = window.location.search;
                if (query.includes("code=") && query.includes("state=")) {
                    await auth0Client.handleRedirectCallback();
                    window.history.replaceState({}, document.title, window.location.pathname);
                }

                // 3. ログインチェック
                const isAuthenticated = await auth0Client.isAuthenticated();

                if (isAuthenticated) {
                    document.getElementById("loading-view").style.display = "none";
                    document.getElementById("logged-in-view").style.display = "block";
                    showPaper();
                } else {
                    await auth0Client.loginWithRedirect();
                }
            } catch (err) {
                console.error(err);
                document.getElementById("loading-view").innerHTML = "Error: " + err.message + "<br>広告ブロックをオフにしてください。";
            }
        };

        function showPaper() {
            document.getElementById("paperTitle").innerText = "On Admissible Operators over Group Rings";
            document.getElementById("abstractText").innerText = "This paper systematically describes the structure...";
        }

        const logout = () => {
            auth0Client.logout({ logoutParams: { returnTo: window.location.origin + window.location.pathname } });
        };
    </script>
</body>
</html>
