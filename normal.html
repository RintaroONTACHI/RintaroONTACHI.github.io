<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-D9DGJTDV9B"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-D9DGJTDV9B');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rintaro ONTACHI | Academic Profile</title>

    <style>
        body {
            margin: 0; padding: 0; color: #24292e; font-size: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0e14;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255,255,255,0.9) 0%, transparent 70%),
                linear-gradient(125deg, #ffffff 0%, #ffffff 30%, #d1d5da 35%, #444d56 50%, #1b1f23 70%, #0b0e14 100%);
            background-attachment: fixed; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; width: 100%; }

        header, .glass-section, footer, .research-card {
            background-color: rgba(255, 255, 255, 0.82); 
            padding: 30px 40px; border-radius: 16px; margin-bottom: 25px; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* ログイン状態による表示制御 */
        #logged-in-view { display: none; }
        #loading-view { text-align: center; color: white; background: rgba(0,0,0,0.6); padding: 30px; border-radius: 15px; }

        .logout-btn { 
            background: #d93025; color: white; border: none; padding: 8px 16px; 
            border-radius: 6px; cursor: pointer; float: right; font-weight: bold;
        }

        .paper-selector { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .paper-btn { padding: 10px 20px; border: 1px solid #d1d5da; background: #fff; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .paper-btn.active { background: #002f5d; color: #fff; }
        .pdf-container { margin: 20px 0; border: 1px solid #d1d5da; border-radius: 8px; overflow: hidden; background: white; }
        iframe { width: 100%; height: 600px; border: none; }
        .link-list { list-style: none; padding: 0; }
        .link-list li { margin-bottom: 12px; }
        .link-list a { color: #0366d6; text-decoration: none; font-weight: 500; }
        .abstract-content { line-height: 1.6; text-align: justify; color: #333; }
    </style>
</head>
<body>

    <div id="loading-view">
        <p>Authenticating... Please wait.</p>
    </div>

    <div id="logged-in-view" class="container">
        <header>
            <button class="logout-btn" onclick="logout()">Log Out</button>
            <h1>Academic Resources</h1>
            <p><strong>Rintaro ONTACHI</strong> | Independent Researcher</p>
        </header>

        <section class="research-card">
            <div class="paper-selector" id="paperSelector"></div>
            <div id="dynamicContent">
                <h2 id="paperTitle">Loading...</h2>
                <ul id="downloadLinks" class="link-list"></ul>
                <div class="pdf-container">
                    <iframe id="pdfViewer" src="" title="Document Preview"></iframe>
                </div>
                <div id="abstractText" class="abstract-content"></div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 Rintaro ONTACHI | Built with GitHub Pages</p>
        </footer>
    </div>

    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
    
    <script src="main.js"></script>

    <script>
        const papers = [
            {
                label: "Paper 1",
                title: "On Admissible Operators over Group Rings",
                pdf: "001.pdf",
                tex: "001.tex",
                abstract: "This paper systematically describes the structure of linear combinations in the group ring <strong>CG</strong> from three perspectives: algebra, analysis, and quantum mechanics..."
            }
        ];

        const selector = document.getElementById('paperSelector');
        const titleEl = document.getElementById('paperTitle');
        const viewer = document.getElementById('pdfViewer');
        const abstractDiv = document.getElementById('abstractText');
        const downloadDiv = document.getElementById('downloadLinks');

        function updatePaper(index) {
            const p = papers[index];
            if (!p) return;
            
            titleEl.innerText = p.title;
            viewer.src = p.pdf;
            abstractDiv.innerHTML = p.abstract;
            downloadDiv.innerHTML = `
                <li><a href="${p.tex}" download>Source (${p.tex})</a></li>
                <li><a href="${p.pdf}" download>Full Paper (PDF)</a></li>
            `;
            
            document.querySelectorAll('.paper-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
        }

        // 初期化
        papers.forEach((p, index) => {
            const btn = document.createElement('button');
            btn.className = 'paper-btn';
            btn.innerText = p.label;
            btn.onclick = () => updatePaper(index);
            selector.appendChild(btn);
        });

        if (papers.length > 0) updatePaper(0);
    </script>
</body>
</html>
