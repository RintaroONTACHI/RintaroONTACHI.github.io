<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-D9DGJTDV9B"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-D9DGJTDV9B');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rintaro ONTACHI | Academic Profile</title>

    <style>
        /* Existing Styles (Keep as is) */
        body {
            margin: 0; padding: 0; color: #24292e; font-size: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0e14;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255,255,255,0.9) 0%, transparent 70%),
                linear-gradient(125deg, #ffffff 0%, #ffffff 30%, #d1d5da 35%, #444d56 50%, #1b1f23 70%, #0b0e14 100%);
            background-attachment: fixed; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; width: 100%; }

        header, .glass-section, footer, .research-card {
            background-color: rgba(255, 255, 255, 0.82); 
            padding: 30px 40px;
            border-radius: 16px; margin-bottom: 25px; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .research-card { background-color: rgba(255, 255, 255, 0.95); padding: 40px; }
        h1 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 0; font-size: 2em; }
        h2 { margin-top: 0; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; color: #002f5d; font-size: 1.4em; }

        /* Selector Buttons */
        .paper-selector { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .paper-btn {
            padding: 10px 20px; border: 1px solid #d1d5da; background: #fff;
            border-radius: 8px; cursor: pointer; font-size: 0.9em; transition: 0.2s; font-weight: bold;
        }
        .paper-btn.active { background: #002f5d; color: #fff; border-color: #002f5d; }
        
        .link-list { list-style: none; padding: 0; }
        .link-list li { margin-bottom: 12px; }
        .link-list a { color: #0366d6; text-decoration: none; font-weight: 500; }

        .pdf-container { margin: 20px 0 30px 0; border: 1px solid #d1d5da; border-radius: 8px; overflow: hidden; background: #fff; }
        iframe { width: 100%; height: 600px; border: none; }

        .abstract-container { border-top: 1px solid #eee; padding-top: 25px; }
        .abstract-label { font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.2em; color: #666; margin-bottom: 15px; font-weight: bold; display: block; }
        .abstract-content { font-family: 'EB Garamond', serif; font-size: 0.95em; line-height: 1.7; color: #1a1a1a; text-align: justify; }

        /* Auth0 Views Control */
        #logged-in-view { display: none; }
        #loading-view { text-align: center; color: white; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px; }
        
        .logout-btn { 
            background: #d93025; color: white; border: none; padding: 8px 16px; 
            border-radius: 6px; cursor: pointer; float: right; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="loading-view">
    <p>Authenticating... Please wait.</p>
</div>

<div id="logged-in-view" class="container">
    <header>
        <button class="logout-btn" onclick="logout()">Log Out</button>
        <h1 id="status">Academic Resources</h1>
        <p style="font-size: 1.05em; color: #444; margin: 10px 0 0 0;"><strong>Rintaro ONTACHI</strong> | Independent Researcher</p>
    </header>

    <section class="glass-section">
        <h2>Profiles & Links</h2>
        <ul class="link-list">
            <li><a href="https://orcid.org/0009-0008-9733-8193" target="_blank">ORCID Profile</a></li>
            <li><a href="https://zenodo.org/search?q=metadata.creators.person_or_org.name%3A%22Ontachi%2C%20Rintaro%22" target="_blank">Zenodo Profile</a></li>
        </ul>
    </section>

    <section class="research-card">
        <div class="paper-selector" id="paperSelector"></div>
        <div id="dynamicContent">
            <h2 id="paperTitle">Loading...</h2>
            <ul id="downloadLinks" class="link-list" style="margin-bottom: 25px;"></ul>
            <div class="pdf-container">
                <iframe id="pdfViewer" src="" title="Document Preview"></iframe>
            </div>
            <div class="abstract-container">
                <span class="abstract-label">Abstract</span>
                <div id="abstractText" class="abstract-content"></div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Rintaro ONTACHI | Built with GitHub Pages</p>
    </footer>
</div>

<script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
<script src="main.js"></script>

<script>
    // --- Existing Research Data & Logic ---
    const papers = [
        {
            label: "Paper 1",
            title: "On Admissible Operators over Group Rings",
            pdf: "001.pdf",
            tex: "001.tex",
            abstract: "This paper systematically describes the structure of linear combinations in the group ring <strong>CG</strong> from three perspectives: algebra, analysis, and quantum mechanics..."
        }
    ];

    const selector = document.getElementById('paperSelector');
    const titleEl = document.getElementById('paperTitle');
    const viewer = document.getElementById('pdfViewer');
    const abstractDiv = document.getElementById('abstractText');
    const downloadDiv = document.getElementById('downloadLinks');

    function updatePaper(index) {
        const p = papers[index];
        titleEl.innerText = p.title;
        viewer.src = p.pdf;
        abstractDiv.innerHTML = p.abstract;
        downloadDiv.innerHTML = `
            <li><a href="${p.tex}" download>Download Source (${p.tex})</a></li>
            <li><a href="${p.pdf}" download>Download Full Paper (${p.pdf})</a></li>
        `;
        document.querySelectorAll('.paper-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === index);
        });
    }

    papers.forEach((p, index) => {
        const btn = document.createElement('button');
        btn.className = 'paper-btn';
        btn.innerText = p.label;
        btn.onclick = () => updatePaper(index);
        selector.appendChild(btn);
    });

    updatePaper(0);
</script>

</body>
</html>
